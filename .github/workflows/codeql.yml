name: "CodeQL"

on:
  push:
    branches: [ master ]
  pull_request:
  schedule:
    - cron: "24 3 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze C/C++
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            libboost-filesystem-dev \
            libboost-program-options-dev \
            libboost-system-dev \
            liblua5.4-dev \
            libshp-dev \
            libsqlite3-dev \
            rapidjson-dev

      - uses: github/codeql-action/init@v4
        with:
          languages: c-cpp
          build-mode: manual

      - name: Build
        run: |
          cmake -S . -B build-codeql -DCMAKE_BUILD_TYPE=RelWithDebInfo
          cmake --build build-codeql --parallel 2

      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:c-cpp"
